<div class="min-h-screen bg-[#F8F9FA] text-[#2E3A4A] py-12 px-4 sm:px-6 lg:px-8 flex flex-col items-center">
  <div class="w-full max-w-3xl">
    
    <div class="mb-8">
      <a routerLink="/owner" class="inline-flex items-center text-sm font-medium text-gray-400 hover:text-[#9599C8] transition-colors mb-4 group">
        <svg class="w-4 h-4 mr-2 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Back to Dashboard
      </a>
      <h1 class="font-serif text-4xl text-[#2E3A4A] font-medium tracking-tight">Add New Property</h1>
      <p class="text-gray-500 mt-2 font-light">List your property and start reaching potential renters globally.</p>
    </div>

    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 sm:p-10">
      
      <!-- Basic Details -->
      <div class="mb-8">
        <h2 class="text-lg font-serif font-medium text-[#2E3A4A] border-b border-gray-100 pb-3 mb-6">Basic Details</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          
          <div class="space-y-1.5">
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Property Title *</label>
            <input [(ngModel)]="model.title" placeholder="e.g. Sunny Villa by the Beach" class="w-full bg-[#F8F9FA] border border-gray-200 rounded-xl px-4 py-3 text-[#2E3A4A] focus:bg-white focus:border-[#9599C8] focus:ring-2 focus:ring-[#9599C8]/20 transition-all outline-none">
          </div>
          
          <div class="space-y-1.5">
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Location *</label>
            <input [(ngModel)]="model.location" placeholder="e.g. Malibu, California" class="w-full bg-[#F8F9FA] border border-gray-200 rounded-xl px-4 py-3 text-[#2E3A4A] focus:bg-white focus:border-[#9599C8] focus:ring-2 focus:ring-[#9599C8]/20 transition-all outline-none">
          </div>
          
          <div class="space-y-1.5">
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Property Type</label>
            <div class="relative">
              <select [(ngModel)]="model.propertyType" class="w-full bg-[#F8F9FA] border border-gray-200 rounded-xl px-4 py-3 text-[#2E3A4A] focus:bg-white focus:border-[#9599C8] focus:ring-2 focus:ring-[#9599C8]/20 transition-all outline-none appearance-none cursor-pointer">
                <option value="Apartment">Apartment</option>
                <option value="Villa">Villa</option>
                <option value="Bungalow">Bungalow</option>
                <option value="Flat">Flat</option>
              </select>
              <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
              </div>
            </div>
          </div>
          
          <div class="space-y-1.5 flex gap-4">
            <div class="flex-1">
              <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Price per night *</label>
              <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                  <span class="text-gray-400 font-medium">₹</span>
                </div>
                <input [(ngModel)]="model.price" type="number" min="0" placeholder="0" class="w-full bg-[#F8F9FA] border border-gray-200 rounded-xl pl-9 pr-4 py-3 text-[#2E3A4A] focus:bg-white focus:border-[#9599C8] focus:ring-2 focus:ring-[#9599C8]/20 transition-all outline-none">
              </div>
            </div>
            <div class="flex-1">
              <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Max Guests</label>
              <input [(ngModel)]="model.maxGuests" type="number" min="1" placeholder="2" class="w-full bg-[#F8F9FA] border border-gray-200 rounded-xl px-4 py-3 text-[#2E3A4A] focus:bg-white focus:border-[#9599C8] focus:ring-2 focus:ring-[#9599C8]/20 transition-all outline-none">
            </div>
          </div>
        </div>
      </div>

      <!-- Media & Description -->
      <div class="mb-8">
        <h2 class="text-lg font-serif font-medium text-[#2E3A4A] border-b border-gray-100 pb-3 mb-6">Description & Media</h2>
        <div class="space-y-6">
          
          <div class="space-y-1.5">
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Property Description</label>
            <textarea [(ngModel)]="model.description" rows="4" placeholder="Describe what makes your property unique..." class="w-full bg-[#F8F9FA] border border-gray-200 rounded-xl px-4 py-3 text-[#2E3A4A] focus:bg-white focus:border-[#9599C8] focus:ring-2 focus:ring-[#9599C8]/20 transition-all outline-none resize-none"></textarea>
          </div>

          <div class="bg-[#F8F9FA] border border-gray-200 border-dashed rounded-2xl p-6 text-center transition-colors hover:border-[#9599C8]/50">
            <svg class="mx-auto h-12 w-12 text-gray-400 mb-3" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
              <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <div class="flex text-sm text-gray-600 justify-center">
              <label for="file-upload" class="relative cursor-pointer bg-white rounded-md font-medium text-[#9599C8] hover:text-[#8084B6] focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-[#9599C8] px-2 py-0.5">
                <span>Upload a file</span>
                <input id="file-upload" name="file-upload" type="file" accept=".jpg,.jpeg,.png,.webp" (change)="onFileSelected($event)" class="sr-only">
              </label>
              <p class="pl-1">or provide a URL below</p>
            </div>
            <p class="text-xs text-gray-500 mt-2">PNG, JPG, WEBP up to 5MB</p>
            
            <div *ngIf="uploadingImage" class="mt-4 flex items-center justify-center gap-2 text-sm text-[#9599C8]">
              <div class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-current border-t-transparent text-[#9599C8]" role="status" aria-label="loading"></div>
              Uploading image...
            </div>
          </div>
          
          <div class="space-y-1.5 mt-4">
            <input [(ngModel)]="model.imageUrl" placeholder="Image URL (if not uploading)" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-[#2E3A4A] focus:border-[#9599C8] focus:ring-2 focus:ring-[#9599C8]/20 transition-all outline-none">
          </div>
          
        </div>
      </div>

      <!-- Amenities -->
      <div class="mb-10">
        <h2 class="text-lg font-serif font-medium text-[#2E3A4A] border-b border-gray-100 pb-3 mb-6">Amenities</h2>
        <div class="flex flex-wrap gap-4 bg-gray-50/50 p-5 rounded-2xl border border-gray-100">
          <label class="flex items-center gap-3 cursor-pointer group">
            <div class="relative flex items-center">
              <input type="checkbox" [(ngModel)]="model.hasPool" class="w-5 h-5 text-[#9599C8] focus:ring-[#9599C8] bg-white border-gray-300 rounded cursor-pointer transition-colors">
            </div>
            <span class="text-sm font-medium text-gray-700 group-hover:text-[#2E3A4A] transition-colors">Swimming Pool</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer group">
            <div class="relative flex items-center">
              <input type="checkbox" [(ngModel)]="model.isBeachFacing" class="w-5 h-5 text-[#9599C8] focus:ring-[#9599C8] bg-white border-gray-300 rounded cursor-pointer transition-colors">
            </div>
            <span class="text-sm font-medium text-gray-700 group-hover:text-[#2E3A4A] transition-colors">Beach Facing</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer group">
            <div class="relative flex items-center">
              <input type="checkbox" [(ngModel)]="model.hasGarden" class="w-5 h-5 text-[#9599C8] focus:ring-[#9599C8] bg-white border-gray-300 rounded cursor-pointer transition-colors">
            </div>
            <span class="text-sm font-medium text-gray-700 group-hover:text-[#2E3A4A] transition-colors">Garden</span>
          </label>
        </div>
      </div>

      <!-- Status & Actions -->
      <div *ngIf="error" class="bg-red-50 text-red-600 p-4 rounded-xl mb-6 flex items-center gap-3 shadow-sm border border-red-100">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        <span class="text-sm">{{ error }}</span>
      </div>

      <div class="flex items-center justify-end gap-4 pt-6 border-t border-gray-100">
        <a routerLink="/owner" class="px-6 py-3 rounded-full font-medium text-gray-600 hover:bg-gray-50 transition-colors">
          Cancel
        </a>
        <button [disabled]="loading || uploadingImage" (click)="submit()" class="bg-[#9599C8] hover:bg-[#8588b5] text-white px-8 py-3 rounded-full font-medium transition-all shadow-md focus:ring-4 focus:ring-[#9599C8]/30 disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center min-w-[160px]">
          <span *ngIf="loading" class="flex items-center gap-2">
            <div class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"></div>
            Saving...
          </span>
          <span *ngIf="!loading">Add Property</span>
        </button>
      </div>

    </div>
  </div>
</div>
