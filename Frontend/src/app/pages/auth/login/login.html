<div class="flex min-h-screen font-sans">

  <!-- Left Panel: Hero Image -->
  <div class="relative hidden lg:flex lg:w-1/2 flex-col items-start justify-end overflow-hidden">
    <img src="/auth-hero.jpg" alt="Luxury Property" class="absolute inset-0 h-full w-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-ink/90 via-ink/30 to-transparent"></div>
    <div class="relative z-10 p-12 text-white">
      <div class="flex gap-1 mb-3">
        <svg *ngFor="let i of [1,2,3,4,5]" class="w-4 h-4 text-gold" fill="currentColor" viewBox="0 0 20 20">
          <path
            d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z">
          </path>
        </svg>
      </div>
      <p class="text-white/90 text-base italic leading-relaxed max-w-xs mb-4">"Booked a stunning villa in Bali in
        minutes. The whole experience was absolutely seamless."</p>
      <p class="text-white/60 text-xs font-bold uppercase tracking-widest">— Priya M., Verified Renter</p>
    </div>
  </div>

  <!-- Right Panel: Form -->
  <div class="flex w-full flex-col items-center justify-center bg-warm px-6 py-12 lg:w-1/2">
    <div class="w-full max-w-[400px]">

      <!-- Logo -->
      <div class="mb-8 text-center">
        <a routerLink="/"
          class="inline-block font-serif text-3xl font-black tracking-tight text-ink hover:opacity-80 transition-opacity">
          Rent<span class="font-extralight italic text-accent/90">APlace</span>
        </a>
        <p class="mt-2 text-sm text-muted">Welcome back · Sign in to continue</p>
      </div>

      <!-- Demo Credentials Cards -->
      <div class="grid grid-cols-2 gap-3 mb-6">
        <button (click)="fillDemo('renter')"
          class="rounded-xl border border-border bg-white p-3 text-left hover:border-accent hover:shadow-sm transition-all group">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-[10px] font-bold uppercase tracking-wider text-accent">Try Renter</span>
          </div>
          <p class="text-[10px] text-muted font-mono">renter&#64;demo.com</p>
          <p class="text-[10px] text-muted font-mono">Password123!</p>
        </button>
        <button (click)="fillDemo('owner')"
          class="rounded-xl border border-border bg-white p-3 text-left hover:border-accent hover:shadow-sm transition-all group">
          <div class="flex items-center gap-2 mb-1">
            <span class="text-[10px] font-bold uppercase tracking-wider text-accent">Try Owner</span>
          </div>
          <p class="text-[10px] text-muted font-mono">owner&#64;demo.com</p>
          <p class="text-[10px] text-muted font-mono">Password123!</p>
        </button>
      </div>

      <!-- Form Card -->
      <div class="rounded-2xl border border-border bg-white p-8 shadow-sm">
        <div class="space-y-5">

          <div>
            <label class="mb-1.5 block text-[10px] font-bold uppercase tracking-wider text-muted">Email Address</label>
            <input type="email" [(ngModel)]="email" placeholder="you@example.com"
              class="w-full rounded-xl border border-border bg-warm/60 px-4 py-3 text-sm text-ink outline-none transition-all focus:border-accent focus:bg-white focus:ring-2 focus:ring-accent/20" />
          </div>

          <div>
            <label class="mb-1.5 block text-[10px] font-bold uppercase tracking-wider text-muted">Password</label>
            <input type="password" [(ngModel)]="password" placeholder="••••••••"
              class="w-full rounded-xl border border-border bg-warm/60 px-4 py-3 text-sm text-ink outline-none transition-all focus:border-accent focus:bg-white focus:ring-2 focus:ring-accent/20" />
          </div>

          <button (click)="login()" [disabled]="loading"
            class="mt-2 w-full rounded-xl bg-accent hover:bg-accent-hover py-3.5 text-center text-sm font-bold tracking-widest text-white transition-colors disabled:opacity-50 shadow-lg shadow-accent/20">
            {{ loading ? 'SIGNING IN...' : 'SIGN IN' }}
          </button>

          <p *ngIf="error"
            class="rounded-xl bg-red-50 border border-red-100 p-3 text-center text-sm font-medium text-red-600">
            <span class="font-bold">⚠️ </span>{{ error }}
          </p>
        </div>
      </div>

      <p class="mt-6 text-center text-sm text-muted">
        New here? <a routerLink="/register" class="font-bold text-accent hover:text-ink transition-colors">Create an
          account →</a>
      </p>
    </div>
  </div>

</div>
