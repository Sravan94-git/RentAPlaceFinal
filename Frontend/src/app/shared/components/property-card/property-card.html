<article
  (click)="navigateToDetail()"
  class="bg-white p-3 md:p-4 rounded-[20px] shadow-[0_4px_20px_-10px_rgba(0,0,0,0.05)] border border-gray-100 flex flex-col h-full transition-all hover:shadow-xl hover:-translate-y-1 duration-300"
  [class.cursor-pointer]="!showDeleteButton">

  <!-- Image Container -->
  <div class="relative overflow-hidden aspect-[4/3] sm:aspect-square rounded-2xl bg-warm mb-4">
    <div *ngIf="!property.imageUrl" class="w-full h-full flex items-center justify-center text-gray-300">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    </div>
    <img *ngIf="property.imageUrl" [src]="property.imageUrl" [alt]="property.title" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">

    <!-- Hot tag -->
    <div *ngIf="property.rating && property.rating > 4.8" class="absolute top-3 left-3 bg-[#EE5B5B] text-white px-2 py-0.5 rounded-full text-[9px] font-bold tracking-wider uppercase shadow-sm">
      Hot Property
    </div>

    <!-- View detail hint -->
    <div *ngIf="!showDeleteButton" class="absolute inset-0 bg-ink/0 hover:bg-ink/10 transition-all flex items-center justify-center opacity-0 hover:opacity-100">
      <span class="bg-white text-ink text-xs font-bold px-3 py-1.5 rounded-full shadow-md">View Details →</span>
    </div>
  </div>

  <!-- Content Container -->
  <div class="flex flex-col flex-1 px-1">

    <span class="text-[9px] font-bold text-muted uppercase tracking-widest mb-1.5">{{ property.propertyType || 'PROPERTY' }}</span>
    <h3 class="font-serif font-bold text-[18px] text-ink mb-1 line-clamp-1 truncate">{{ property.title }}</h3>

    <!-- Location -->
    <p class="text-[11px] text-muted mb-2 flex items-center gap-1">
      <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      {{ property.location }}
    </p>

    <!-- Stars -->
    <div class="flex items-center gap-1 mb-4">
      <div class="flex items-center text-gold">
        <svg *ngFor="let i of [1,2,3,4,5]" class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20">
          <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path>
        </svg>
      </div>
      <span class="text-[10px] font-semibold text-muted ml-0.5">({{ property.rating || '4.5' }})</span>
    </div>

    <!-- Pricing Area -->
    <div class="flex items-center justify-between mt-auto">
      <div>
        <p class="font-extrabold text-[15px] sm:text-[16px] text-ink">₹{{ property.price | number }}</p>
        <p class="text-[10px] text-muted">per night</p>
      </div>

      <!-- View Detail Button (on listing pages) -->
      <button *ngIf="!showDeleteButton" (click)="$event.stopPropagation(); navigateToDetail()"
        class="bg-accent hover:bg-accent-hover text-white px-4 py-1.5 sm:py-2 rounded-lg text-[11px] sm:text-xs font-bold transition-colors">
        View →
      </button>
    </div>

    <!-- Admin Owner Actions (Only visible in Owner Dashboard) -->
    <div *ngIf="showDeleteButton" class="mt-4 flex gap-2 pt-3 border-t border-border">
      <button (click)="$event.stopPropagation(); onEdit()" class="flex-1 bg-white border border-gray-300 hover:border-ink text-ink px-2 py-2 rounded-lg text-[11px] font-bold transition-colors">EDIT</button>
      <button (click)="$event.stopPropagation(); onRemove()" class="flex-1 bg-white border border-red-200 hover:bg-red-50 text-red-600 px-2 py-2 rounded-lg text-[11px] font-bold transition-colors">DELETE</button>
    </div>

  </div>
</article>
